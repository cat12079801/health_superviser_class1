<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6e4f" />
  <title>第一種衛生管理者 一問一答</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <!-- iOS（ホーム画面追加）向け。Android/Chrome は上記 manifest を用いる。 -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="衛生管理者" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>第一種衛生管理者 <small>一問一答</small></h1>
    <div class="auth" id="auth" hidden>
      <span class="auth-user" id="auth-user" hidden></span>
      <button class="auth-btn" id="login-btn" hidden>Google でログイン</button>
      <button class="auth-btn" id="logout-btn" hidden>ログアウト</button>
      <span class="sync-status" id="sync-status" role="status" aria-live="polite" hidden></span>
    </div>
  </header>

  <main id="app">
    <!-- ホーム -->
    <section id="view-home" class="view">
      <div class="card stats-summary">
        <div class="stat">
          <span class="stat-value" id="home-rate">--%</span>
          <span class="stat-label">全体正答率</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="home-answered">0 / 0</span>
          <span class="stat-label">回答済み</span>
        </div>
      </div>

      <h2 class="section-title">出題モード</h2>
      <div class="card filter-card">
        <p class="filter-note">出題する問題の状態を選ぶ</p>
        <label class="toggle-row">
          <span class="toggle-text">
            <span class="toggle-label">未回答の問題</span>
          </span>
          <input type="checkbox" id="tg-unanswered" class="toggle" checked />
          <span class="switch"></span>
        </label>
        <label class="toggle-row">
          <span class="toggle-text">
            <span class="toggle-label">誤答した問題</span>
          </span>
          <input type="checkbox" id="tg-wrong" class="toggle" checked />
          <span class="switch"></span>
        </label>
      </div>

      <div class="menu">
        <button class="menu-btn" data-mode="all" id="menu-all">
          <span class="menu-title">全問出題</span>
          <span class="menu-desc" id="cnt-all">-</span>
        </button>
        <!-- カテゴリ別出題ボタンは js/app.js が data/categories.json の定義から動的生成する -->
      </div>

      <div class="menu-secondary">
        <button class="link-btn" id="to-stats">📊 学習状況</button>
        <button class="link-btn" id="refresh-data">🔄 問題を更新</button>
        <p class="refresh-status" id="refresh-status" role="status" aria-live="polite"></p>
      </div>
    </section>

    <!-- 出題 -->
    <section id="view-quiz" class="view hidden">
      <div class="quiz-bar">
        <button class="icon-btn" id="quiz-back">← 戻る</button>
        <span class="progress" id="quiz-progress">1 / 1</span>
      </div>

      <div class="card question-card">
        <div class="badges">
          <span class="badge" id="q-category"></span>
          <span class="badge badge-tag" id="q-tags"></span>
        </div>
        <p class="question-text" id="q-text"></p>
        <ol class="choices" id="q-choices"></ol>
      </div>

      <div id="q-result" class="result hidden">
        <div class="result-head" id="q-judge"></div>
        <div class="card explanation">
          <h3>解説</h3>
          <p id="q-explanation"></p>
          <p class="reference" id="q-reference"></p>
          <div class="columns" id="q-columns"></div>
        </div>
      </div>

      <div class="quiz-actions">
        <button class="primary-btn hidden" id="q-submit" disabled>回答する</button>
        <button class="primary-btn hidden" id="q-next">次の問題へ</button>
      </div>
    </section>

    <!-- 統計 -->
    <section id="view-stats" class="view hidden">
      <div class="quiz-bar">
        <button class="icon-btn" id="stats-back">← 戻る</button>
        <span class="progress">学習状況</span>
      </div>

      <div class="card">
        <h2 class="section-title">カテゴリ別正答率</h2>
        <div id="stats-categories"></div>
      </div>

      <div class="card danger-zone">
        <h3>進捗リセット</h3>
        <p class="note">この端末に保存された回答履歴をすべて消去する。</p>
        <button class="danger-btn" id="reset-progress">進捗をリセット</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>本アプリは学習用である。内容の正確性は保証しない。実際の法令・最新情報を必ず確認すること。</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
