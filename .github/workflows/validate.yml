name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-questions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 問題データを検証
        run: node scripts/validate-questions.mjs
